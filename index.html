<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first: lock the viewport, allow safe-area insets, prevent user zoom fighting map gestures -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0d1117" />
  <title>Walk Tracker</title>

  <!-- Leaflet (map library) from CDN — no build step required -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Full-screen map base layer -->
  <div id="map" aria-label="Walk map"></div>

  <!-- Top floating bar: search + locate-me -->
  <header class="top-bar">
    <div class="search">
      <input
        id="search-input"
        type="text"
        inputmode="search"
        autocomplete="off"
        placeholder="Search a place or address…"
        aria-label="Search for a location"
      />
      <button id="search-clear" class="search-clear" aria-label="Clear search" hidden>×</button>
      <ul id="search-results" class="search-results" role="listbox" hidden></ul>
    </div>
    <button id="locate-btn" class="icon-btn" aria-label="Use my current location" title="Use my current location">
      <!-- crosshair / locate glyph -->
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="12" cy="12" r="4" fill="currentColor" />
        <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2" />
        <line x1="12" y1="1" x2="12" y2="5" stroke="currentColor" stroke-width="2" />
        <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" />
        <line x1="1" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2" />
        <line x1="19" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" />
      </svg>
    </button>
    <button id="theme-btn" class="icon-btn" aria-label="Toggle light or dark mode" title="Toggle light/dark mode">
      <!-- sun: shown in dark mode (tap to go light) -->
      <svg class="icon-sun" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5" fill="currentColor" />
        <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="1.5" x2="12" y2="4" />
          <line x1="12" y1="20" x2="12" y2="22.5" />
          <line x1="1.5" y1="12" x2="4" y2="12" />
          <line x1="20" y1="12" x2="22.5" y2="12" />
          <line x1="4.2" y1="4.2" x2="6" y2="6" />
          <line x1="18" y1="18" x2="19.8" y2="19.8" />
          <line x1="19.8" y1="4.2" x2="18" y2="6" />
          <line x1="6" y1="18" x2="4.2" y2="19.8" />
        </g>
      </svg>
      <!-- moon: shown in light mode (tap to go dark) -->
      <svg class="icon-moon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z" fill="currentColor" />
      </svg>
    </button>
  </header>

  <!-- Bottom floating panel: distance readout + path controls -->
  <footer class="bottom-panel">
    <div class="distance" aria-live="polite">
      <span id="dist-miles" class="dist-value">0.0 mi</span>
      <span class="dist-sep">·</span>
      <span id="dist-km" class="dist-value dist-secondary">0.0 km</span>
    </div>
    <div class="controls">
      <button id="undo-btn" class="ctrl-btn" disabled>Undo</button>
      <button id="clear-btn" class="ctrl-btn ctrl-danger" disabled>Clear</button>
    </div>
    <p class="hint" id="hint">Tap the map to start tracing your walk.</p>
  </footer>

  <!-- Transient toast for notices (e.g. geolocation denied) -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <!-- Leaflet JS, then our app (ES modules) -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
